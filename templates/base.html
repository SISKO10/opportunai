{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OPPORTUN'AI{% endblock %}</title>

    <!-- Bootstrap 5 : framework CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Notre CSS personnalisé -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>

    <!-- BARRE DE NAVIGATION -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand fw-bold" href="/">
                🌍 OPPORTUN'AI
            </a>

            <!-- Menu -->
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">
                    <i class="bi bi-house"></i> Accueil
                </a>
                <a class="nav-link" href="/opportunites/">
                    <i class="bi bi-briefcase"></i> Opportunités
                </a>
            </div>

        </div>
    </nav>

    <!-- CONTENU PRINCIPAL -->
    <!-- Chaque page remplace ce bloc -->
    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">
            🌍 OPPORTUN'AI - Opportunités Business et Emploi en Afrique
        </p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- HTMX : mise à jour dynamique sans JavaScript -->
    <script src="https://unpkg.com/htmx.org@1.9.0"></script>

    <!-- Notre JavaScript personnalisé -->
    <script src="{% static 'js/main.js' %}"></script>

    {% block scripts %}
    {% endblock %}

</body>
</html>
