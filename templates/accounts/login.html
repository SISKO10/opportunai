{% extends 'base.html' %}

{% block title %}Connexion - OPPORTUN'AI{% endblock %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">

        <!-- Logo et titre -->
        <div class="text-center mb-4">
            <h1 class="fw-bold">🌍 OPPORTUN'AI</h1>
            <p class="text-muted">
                Connectez-vous pour accéder aux opportunités
            </p>
        </div>

        <!-- Messages d'erreur -->
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}

        <!-- Carte de connexion -->
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">

                <h3 class="fw-bold mb-4 text-center">
                    <i class="bi bi-lock"></i> Connexion
                </h3>

                <form method="POST" action="/login/">
                    {% csrf_token %}

                    <!-- Nom d'utilisateur -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">
                            <i class="bi bi-person"></i> Nom d'utilisateur
                        </label>
                        <input
                            type="text"
                            name="username"
                            class="form-control form-control-lg"
                            placeholder="Votre nom d'utilisateur"
                            required
                        >
                    </div>

                    <!-- Mot de passe -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">
                            <i class="bi bi-key"></i> Mot de passe
                        </label>
                        <input
                            type="password"
                            name="password"
                            class="form-control form-control-lg"
                            placeholder="Votre mot de passe"
                            required
                        >
                    </div>

                    <!-- Bouton connexion -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark btn-lg rounded-3">
                            Se connecter →
                        </button>
                    </div>

                </form>

                <!-- Lien inscription -->
                <div class="text-center mt-4">
                    <p class="text-muted">
                        Pas encore de compte ?
                        <a href="/register/" class="text-dark fw-bold">
                            S'inscrire
                        </a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
